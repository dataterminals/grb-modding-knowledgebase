name: Build Data Inspector (.exe)

# Builds a standalone Windows DataInspector.exe so non-technical modders can
# download and double-click it (no Python needed). It still needs the game's
# oo2core_7_win64.dll at runtime to decompress GRB .data (auto-located from the
# file you open, or set via the "Set Oodle DLL..." button).
#
#   - Run manually from the repo's "Actions" tab (workflow_dispatch), then
#     download the "DataInspector-exe" artifact.
#   - Or push a tag like  data-inspector-v1  to also attach it to a Release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'data-inspector-v*'

permissions:
  contents: write   # needed only for the Release step on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build DataInspector.exe
        working-directory: tools
        run: pyinstaller --onefile --windowed --name DataInspector data_inspect_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DataInspector-exe
          path: tools/dist/DataInspector.exe

      - name: Release title from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: rel
        shell: bash
        run: echo "title=GRB Data Inspector ${GITHUB_REF_NAME#data-inspector-}" >> "$GITHUB_OUTPUT"

      - name: Attach to Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.rel.outputs.title }}
          body: |
            **DataInspector.exe** — standalone Windows app: download and double-click. No Python, no compiling, no workflow runs. (Needs the game's `oo2core_7_win64.dll` at runtime — auto-located from the `.data` you open.)
          files: tools/dist/DataInspector.exe
