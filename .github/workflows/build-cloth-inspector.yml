name: Build Cloth Inspector (.exe)

# Builds a standalone Windows ClothInspector.exe so non-technical modders can
# download and double-click it (no Python needed).
#
#   - Run manually from the repo's "Actions" tab (workflow_dispatch), then
#     download the "ClothInspector-exe" artifact.
#   - Or push a tag like  cloth-inspector-v1  to also attach it to a Release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'cloth-inspector-v*'

permissions:
  contents: write   # needed only for the Release step on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build ClothInspector.exe
        working-directory: tools
        run: pyinstaller --onefile --windowed --name ClothInspector cloth_inspect_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClothInspector-exe
          path: tools/dist/ClothInspector.exe

      - name: Release title from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: rel
        shell: bash
        run: echo "title=GRB Cloth Inspector ${GITHUB_REF_NAME#cloth-inspector-}" >> "$GITHUB_OUTPUT"

      - name: Attach to Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.rel.outputs.title }}
          body: |
            **ClothInspector.exe** — standalone Windows app: download and double-click. No Python, no compiling, no workflow runs.
          files: tools/dist/ClothInspector.exe
